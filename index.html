<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LNG</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;color:#1f2937}header{background:#0f172a;color:#fff;padding:20px;text-align:center}.wrap{max-width:900px;margin:auto;padding:24px}.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:20px}label{display:block;margin:12px 0 6px}select,input{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:10px}button{background:#0f172a;color:#fff;border:0;padding:12px 18px;border-radius:10px;cursor:pointer;margin-top:16px}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left}.hidden{display:none}.topnav{display:flex;gap:10px;justify-content:center;margin-top:10px}.small{font-size:12px;color:#64748b}
</style>
</head>
<body>
<header><h1>Capacete de Ouro - LNG</h1><div class='topnav'><button onclick="showPage('vote')">Votação</button><button onclick="showPage('rank')">Ranking RH</button></div></header>
<div class='wrap'>
<div id='votePage' class='card'>
<h2>Registrar Voto</h2>
<label>Setor</label><select id='setor'></select>
<label>Funcionário</label><select id='nome'></select>
<label>Liderança (0-10)</label><input type='number' min='0' max='10' id='n1'>
<label>Trabalho em equipe (0-10)</label><input type='number' min='0' max='10' id='n2'>
<label>Agilidade (0-10)</label><input type='number' min='0' max='10' id='n4'>
<label>Comprometimento (0-10)</label><input type='number' min='0' max='10' id='n5'>
<button onclick='enviar()'>Enviar voto</button>

<div id='msg'></div>
</div>
<div id='loginPage' class='card hidden'>
<h2>Acesso Ranking</h2>
<label>Senha</label><input type='password' id='senha'>
<button onclick='login()'>Entrar</button><div id='loginMsg'></div>
</div>
<div id='rankPage' class='card hidden'>
<h2>Ranking Geral</h2><button onclick='carregarRanking()'>Atualizar</button>
<table><thead><tr><th>#</th><th>Nome</th><th>Setor</th><th>Média</th></tr></thead><tbody id='tbody'></tbody></table>
</div>
</div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwe4zfFh1IYklfXul8tuXzcnI82svp1MgiVcz_QT0_LsZI5GtDeXzz3yvVUwvx5JWmx7w/exec';
const setores={}; for(let s=1;s<=8;s++){setores['Setor '+s]=Array.from({length:20},(_,i)=>'Funcionário '+s+'-'+(i+1));}
const setorSel=document.getElementById('setor'), nomeSel=document.getElementById('nome');
Object.keys(setores).forEach(s=>{let o=document.createElement('option');o.textContent=s;o.value=s;setorSel.appendChild(o)});
function carregaNomes(){nomeSel.innerHTML='';setores[setorSel.value].forEach(n=>{let o=document.createElement('option');o.textContent=n;o.value=n;nomeSel.appendChild(o)});} setorSel.onchange=carregaNomes; carregaNomes();
function showPage(p){document.getElementById('votePage').classList.add('hidden');document.getElementById('loginPage').classList.add('hidden');document.getElementById('rankPage').classList.add('hidden'); if(p==='vote')votePage.classList.remove('hidden'); else loginPage.classList.remove('hidden');}
function media(vals){return vals.reduce((a,b)=>a+b,0)/vals.length}
async function enviar(){const data={setor:setorSel.value,nome:nomeSel.value,n1:+n1.value,n2:+n2.value,n3:+n3.value,n4:+n4.value,n5:+n5.value,media:media([+n1.value,+n2.value,+n3.value,+n4.value,+n5.value])}; await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(data)}); msg.innerHTML='Voto enviado com sucesso!';}
function login(){if(document.getElementById('senha').value==='RHlong99!!'){loginPage.classList.add('hidden');rankPage.classList.remove('hidden');carregarRanking();} else loginMsg.innerHTML='Senha inválida';}
async function carregarRanking(){const r=await fetch(SCRIPT_URL+'?ranking=1'); const dados=await r.json(); tbody.innerHTML=''; dados.forEach((x,i)=>{tbody.innerHTML+=`<tr><td>${i+1}</td><td>${x.nome}</td><td>${x.setor}</td><td>${Number(x.media).toFixed(2)}</td></tr>`})}
</script>

</body></html>
